schema_version = 1
case_id        = "L1-total-bytes-003"
question       = "What is the total volume of data copied over all channels in this run, in MiB (IEC, 1 MiB = 1048576 bytes)? Note: the `size` column is a unit-suffixed string like '76.000 KiB' or '96 B'."
level          = "L1"
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
answer_type    = "number"
tolerance      = 0.01

# Total bytes copied = sum over distinct copies (dedup by item_uid) of size, parsed
# unit-aware (units on bg4N2 are {B, KiB}, IEC 1024), reported in MiB. any_value(size)
# is deterministic: every chan item_uid has exactly 1 distinct size (verified 0
# violations), so per 1.6(b) any_value over a per-item-constant column is safe.
oracle_sql = """
SELECT ROUND(SUM(bytes) / 1048576.0, 2) AS mib
FROM (SELECT item_uid,
             any_value(CAST(regexp_extract(size, '[0-9.]+', 0) AS DOUBLE) *
                       CASE regexp_extract(size, '[A-Za-z]+', 0)
                         WHEN 'B'   THEN 1
                         WHEN 'KiB' THEN 1024
                         WHEN 'MiB' THEN 1048576
                         WHEN 'GiB' THEN 1073741824
                       END) AS bytes
      FROM (SELECT DISTINCT item_uid, entry_slug, size
            FROM items WHERE entry_slug LIKE '%chan%' AND size IS NOT NULL)
      GROUP BY item_uid)
"""
expected = "6.73"
