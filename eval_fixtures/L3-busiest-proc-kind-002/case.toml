schema_version = 1
case_id        = "L3-busiest-proc-kind-002"
question       = "Which processor kind was busiest over the whole run by total active (running) time — the CPU compute processors, the GPU compute processors, or the runtime's utility processors? Sum how long each kind's tasks were actually running and name the busiest. Ignore IO/system service threads, channels, and host-side GPU proxy processors. Answer with exactly one label: cpu, gpu, or utility."
level          = "L3"
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
answer_type    = "label"
tolerance      = 0.0

# Per-slice SUM(running) per processor kind, raw-ns sort, kind-ASC tiebreak. gpuhost/
# io/system/chan are excluded ('%_gpudev_%' does not match 'gpuhost'). No any_value
# over a running grain (§1.6). On bg4N2: utility 1274.6ms > CPU 963.3 > GPU 659.6.
oracle_sql = """
SELECT kind FROM (
  SELECT CASE WHEN entry_slug LIKE '%_cpu_%' THEN 'CPU'
              WHEN entry_slug LIKE '%_gpudev_%' THEN 'GPU'
              WHEN entry_slug LIKE '%_utility_%' THEN 'utility' END AS kind, running
  FROM items WHERE running.start IS NOT NULL
    AND (entry_slug LIKE '%_cpu_%' OR entry_slug LIKE '%_gpudev_%' OR entry_slug LIKE '%_utility_%'))
GROUP BY kind ORDER BY SUM(running.duration) DESC, kind ASC LIMIT 1
"""
expected = "utility"
