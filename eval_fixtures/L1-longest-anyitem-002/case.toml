case_id        = "L1-longest-anyitem-002"
question       = "Across EVERY item in the profile (no processor-kind filter — include runtime/IO service threads and utility meta-tasks), which one ran the longest single uninterrupted stretch in the highlighted range?"
level          = "L1"
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
range_ns       = [1000000000, 1500000000]
answer_type    = "uid"
tolerance      = 0.0

# The SCOPE TRAP — contrast with L1-longest-in-range-001 (app-scope -> 48). With NO
# proc filter the answer is uid 1 (External Thread, an io/service thread spanning the
# window), proving why app-scope is the sensible default. Deterministic per-slice
# argmax, tiebreak item_uid.
oracle_sql = """
SELECT item_uid
FROM (SELECT DISTINCT item_uid, entry_slug,
             running.start AS s, running.stop AS e, running.duration AS dur
      FROM items WHERE running.start IS NOT NULL)
WHERE s < 1500000000 AND e > 1000000000
ORDER BY dur DESC, item_uid ASC
LIMIT 1
"""
expected = "1"
