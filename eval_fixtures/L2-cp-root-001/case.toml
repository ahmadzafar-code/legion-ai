# Root = deepest row of the cycle-guarded critical-path walk from uid 48. Mirrors
# find_blockers_sql(48); authoritative pin: tools.rs test_find_blockers_cycle_guard
# (7-row chain ending at uid 1 "External Thread <196>").
oracle_sql = """
SELECT uid
FROM (WITH RECURSIVE edges AS (
        SELECT DISTINCT item_uid AS src, critical_path.item_uid AS dst
        FROM items WHERE critical_path.item_uid IS NOT NULL),
      walk AS (
        SELECT CAST(48 AS UBIGINT) AS uid, 0 AS depth,
               [CAST(48 AS UBIGINT)] AS path, FALSE AS cycle
        UNION ALL
        SELECT e.dst, w.depth + 1, list_append(w.path, e.dst),
               list_contains(w.path, e.dst)
        FROM walk w JOIN edges e ON e.src = w.uid
        WHERE w.depth < 64 AND NOT w.cycle AND NOT list_contains(w.path, e.dst))
      SELECT uid, depth FROM walk)
ORDER BY depth DESC, uid ASC
LIMIT 1
"""
expected = "1"
