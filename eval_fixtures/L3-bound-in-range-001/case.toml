schema_version = 1
case_id        = "L3-bound-in-range-001"
question       = "In the highlighted time range, is this run computation-bound or communication-bound? Answer with exactly one label: computation-bound or communication-bound."
level          = "L3"
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
range_ns       = [1800000000, 2300000000]
answer_type    = "label"
tolerance      = 0.0

# compute = per-slice SUM(running.duration) on cpu/gpudev overlapping the window
# (deterministic per-slice); comm = dedup-by-item_uid SUM(lifetime.duration) on chan
# overlapping (lifetime is per-uid constant, so any_value is deterministic). Verdict
# = whichever is larger. On bg4N2: 478.678ms compute vs 49.763ms comm -> compute.
oracle_sql = """
SELECT CASE WHEN compute_ns > comm_ns THEN 'computation-bound' ELSE 'communication-bound' END AS verdict
FROM (
  SELECT
    (SELECT SUM(dur) FROM (SELECT DISTINCT item_uid, entry_slug,
            running.start AS s, running.stop AS e, running.duration AS dur
          FROM items
          WHERE running.start IS NOT NULL
            AND (entry_slug LIKE '%_cpu_%' OR entry_slug LIKE '%_gpudev_%'))
     WHERE s < 2300000000 AND e > 1800000000) AS compute_ns,
    (SELECT SUM(dur) FROM (SELECT item_uid,
            any_value(lifetime.start) s, any_value(lifetime.stop) e,
            any_value(lifetime.duration) dur
          FROM (SELECT DISTINCT item_uid, entry_slug, lifetime
                FROM items WHERE entry_slug LIKE '%chan%')
          GROUP BY item_uid)
     WHERE s < 2300000000 AND e > 1800000000) AS comm_ns
)
"""
expected = "computation-bound"
