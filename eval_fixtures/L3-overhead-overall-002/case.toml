schema_version = 1
case_id        = "L3-overhead-overall-002"
question       = "Is this run runtime-overhead-bound overall? Compare total utility/meta-task running time against total application (CPU/GPU-device) running time and answer 'overhead-bound' if the meta time exceeds the application time, otherwise 'compute-bound'."
level          = "L3"
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
answer_type    = "label"
tolerance      = 0.0

# meta = SUM(running) on %util% (dedup); app = SUM(running) on cpu/gpudev (dedup).
# On bg4N2: meta 1274.6ms vs app 1622.8ms (ratio 0.44) -> compute-bound. SUM over the
# dedup grain is order-independent -> deterministic.
oracle_sql = """
SELECT CASE WHEN meta_ns > app_ns THEN 'overhead-bound' ELSE 'compute-bound' END AS verdict
FROM (SELECT
        (SELECT SUM(running.duration)
         FROM (SELECT DISTINCT item_uid, entry_slug, running
               FROM items
               WHERE running.start IS NOT NULL AND entry_slug LIKE '%util%')) AS meta_ns,
        (SELECT SUM(running.duration)
         FROM (SELECT DISTINCT item_uid, entry_slug, running
               FROM items
               WHERE running.start IS NOT NULL
                 AND (entry_slug LIKE '%_cpu_%' OR entry_slug LIKE '%_gpudev_%'))) AS app_ns)
"""
expected = "compute-bound"
