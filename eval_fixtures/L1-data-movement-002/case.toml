schema_version = 1
case_id        = "L1-data-movement-002"
question       = "Which channel carried the most communication time over the whole run? Answer with the channel's EXACT entry_slug identifier (e.g. n0_chan_n0s0_n0f5)."
level          = "L1"
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
answer_type    = "label"
tolerance      = 0.0

# Busiest channel by communication time = SUM(lifetime.duration) per channel, copies
# dedup'd by item_uid and assigned to their min(entry_slug). Argmax entry_slug,
# tiebreak entry_slug ASC for determinism. Graded as an exact (case-insensitive)
# slug match.
oracle_sql = """
SELECT entry_slug
FROM (SELECT entry_slug, SUM(ld) AS total
      FROM (SELECT item_uid, min(entry_slug) AS entry_slug,
                   any_value(lifetime.duration) AS ld
            FROM (SELECT DISTINCT item_uid, entry_slug, lifetime
                  FROM items WHERE entry_slug LIKE '%chan%') s
            GROUP BY item_uid)
      GROUP BY entry_slug)
ORDER BY total DESC, entry_slug ASC
LIMIT 1
"""
expected = "n0_chan_n0s0_n0f5"
