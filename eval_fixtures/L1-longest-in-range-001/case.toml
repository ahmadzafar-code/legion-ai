schema_version = 1
case_id        = "L1-longest-in-range-001"
question       = "Which application task spent the most running time WITHIN the highlighted range? (Application tasks only — CPU/GPU compute processors; count only the portion of each task's running time that falls inside the range.)"
level          = "L1"
# Points at the shared bg4N2 fixture (relative to this case.toml) so we do not copy
# the multi-MB .duckdb into the repo. External cases ship their own co-located file.
duckdb_relpath = "../../../multinoderuns/bg4N2/profcbN2g4b.duckdb"
sha256         = "93d2066d564706a8ea06015603ead75816075697838ccf13b0d3d3ff54bbb427"
range_ns       = [1000000000, 1500000000]
answer_type    = "uid"
tolerance      = 0.0

# Oracle runs on a DIRECT connection (independent answer key). SEMANTICS (user
# decision, reconciled): "most running time WITHIN the range" = CLIPPED OCCUPANCY —
# sum each task's running time CLIPPED to the highlighted window (LEAST/GREATEST),
# NOT the single longest slice. Scope = application procs only (cpu/gpudev). Per-slice
# DISTINCT then GROUP BY item_uid so it is deterministic; tiebreak on item_uid.
# On bg4N2 [1.0s,1.5s]: uid 221 = 278.6ms in-range (vs uid 48's longest-single-slice
# 256.8ms) — the clipped winner, verified byte-stable.
oracle_sql = """
WITH d AS (SELECT DISTINCT item_uid, entry_slug, running.start AS s, running.stop AS e
           FROM items WHERE running.start IS NOT NULL
             AND (entry_slug LIKE '%_cpu_%' OR entry_slug LIKE '%_gpudev_%')
             AND running.start < 1500000000 AND running.stop > 1000000000),
clip AS (SELECT item_uid, SUM(LEAST(e,1500000000) - GREATEST(s,1000000000)) AS ns_in_range
         FROM d GROUP BY item_uid)
SELECT item_uid FROM clip ORDER BY ns_in_range DESC, item_uid ASC LIMIT 1
"""
expected = "221"
