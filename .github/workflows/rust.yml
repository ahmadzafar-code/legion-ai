on: [push, pull_request, workflow_dispatch]

name: CI

env:
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --no-default-features --lib
      - run: cargo check --no-default-features --features client --all-targets
      - run: cargo check --no-default-features --features server --lib
      - run: cargo check --all-features --all-targets
      # AI-layer feature matrix: each combo must compile on its own.
      - run: cargo check --features ai --all-targets
      - run: cargo check --features duckdb --all-targets
      - run: cargo check --features ai,duckdb --all-targets
      - run: cargo check --features viewer-mcp --all-targets
      - run: cargo check --features eval --all-targets

  check_mac:
    name: Check macOS
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --no-default-features --lib
      - run: cargo check --no-default-features --features client --all-targets
      - run: cargo check --no-default-features --features server --lib
      - run: cargo check --all-features --all-targets
      # AI-layer feature matrix: each combo must compile on its own.
      - run: cargo check --features ai --all-targets
      - run: cargo check --features duckdb --all-targets
      - run: cargo check --features ai,duckdb --all-targets
      - run: cargo check --features viewer-mcp --all-targets
      - run: cargo check --features eval --all-targets

  check_wasm:
    name: Check wasm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
        with:
          target: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --no-default-features --lib --target wasm32-unknown-unknown
      - run: cargo check --no-default-features --features client --lib --target wasm32-unknown-unknown

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev
      # --all-targets (not --lib) so bin-target tests run too — the eval binary's
      # 20 grader/extraction tests were previously excluded from CI.
      - run: cargo test --all-features --all-targets

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Prebuilt binary (no compile — avoids cargo-audit's own MSRV churn).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Scan Cargo.lock against the RustSec advisory DB. A first failure here is
      # a real signal: fix the dependency or record an ignore in audit.toml.
      - run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # advisories + bans + sources per deny.toml. `licenses` is intentionally
      # excluded until its allow-list is curated (see deny.toml).
      - run: cargo deny check advisories bans sources

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-features --all-targets -- -D warnings

  trunk:
    name: Trunk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.1
        with:
          target: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.18.8/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf-
      - run: ./trunk build
