# cargo-deny policy. CI runs: cargo deny check advisories bans sources
#
# `licenses` is staged below but NOT yet enforced in CI — the allow-list must be
# validated against a first `cargo deny check licenses` run (which reports every
# license actually present) before it can gate a build without false failures.

[advisories]
version = 2
yanked = "deny"
# Triage RustSec advisories here by id once reviewed, e.g. ["RUSTSEC-2024-XXXX"].
ignore = []

[bans]
# Duplicate versions and wildcard deps warn (informational) rather than fail —
# a large egui/wgpu tree legitimately carries some duplicates.
multiple-versions = "warn"
wildcards = "warn"

[sources]
# Only crates.io is allowed; the tree has no git dependencies (verified).
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
version = 2
# Permissive licenses this project accepts. Extend after the first
# `cargo deny check licenses` run enumerates what the tree actually uses.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
]
